<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f49bd",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Hackathon Lobby</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Main Wrapper -->
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-background-light dark:bg-background-dark shadow-xl">
<!-- Header -->
<div class="flex items-center p-4 pb-2 justify-between sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<div class="w-10"></div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">My Hackathons</h2>
<button class="flex items-center justify-center rounded-lg bg-primary text-white h-9 px-3 gap-1 hover:opacity-90 transition-opacity active:scale-95">
<span class="material-symbols-outlined text-[18px]">add</span>
<span class="text-sm font-bold">Create</span>
</button>
</div>
<!-- Search Bar -->
<div class="px-4 py-3">
<label class="flex flex-col w-full">
<div class="flex w-full items-stretch rounded-xl h-12 bg-slate-200/50 dark:bg-slate-800/50 border border-slate-300/30 dark:border-slate-700/30 overflow-hidden focus-within:ring-2 focus-within:ring-primary/50 transition-all">
<div class="flex items-center justify-center pl-4 text-slate-500">
<span class="material-symbols-outlined text-[20px]">search</span>
</div>
<input class="w-full bg-transparent border-none focus:ring-0 text-slate-900 dark:text-slate-100 placeholder:text-slate-500 px-3 text-base font-normal" placeholder="Search hackathons" value=""/>
</div>
</label>
</div>
<!-- Admin Info Banner -->
<!-- Hackathon List -->
<div class="px-4 space-y-4 pb-24">
<!-- Card 1 -->
<div class="flex flex-col items-stretch justify-start rounded-xl overflow-hidden shadow-sm border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50">
<div class="flex flex-col p-4 gap-3">
<div class="flex justify-between items-start">
<div>
<p class="text-primary text-xs font-bold uppercase tracking-wider mb-1">Status: Live</p>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">Global AI Hackathon 2024</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Oct 15 - Oct 17, 2024</p>
</div>
</div>
<div class="flex items-center gap-2 pt-2 border-t border-slate-100 dark:border-slate-800"><div class="grid grid-cols-3 gap-2 flex-1">
<button class="h-9 flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 text-[13px] font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">View Results</button>
<button class="h-9 flex items-center justify-center rounded-lg bg-primary text-white text-[13px] font-bold shadow-sm hover:opacity-90 active:scale-95 transition-all">Enter Scoring</button>
<button class="h-9 flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 text-[13px] font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Edit Results</button>
</div>
<button class="size-9 flex items-center justify-center rounded-lg text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors ml-1">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button></div>
</div>
</div>
<!-- Card 2 -->
<div class="flex flex-col items-stretch justify-start rounded-xl overflow-hidden shadow-sm border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50">
<div class="flex flex-col p-4 gap-3">
<div class="flex justify-between items-start">
<div>
<p class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Status: Upcoming</p>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">Cyber-Shield Challenge</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Nov 02 - Nov 05, 2024</p>
</div>
</div>
<div class="flex items-center gap-2 pt-2 border-t border-slate-100 dark:border-slate-800"><div class="grid grid-cols-3 gap-2 flex-1">
<button class="h-9 flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 text-[13px] font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">View Results</button>
<button class="h-9 flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-400 dark:text-slate-500 text-[11px] font-bold leading-tight text-center cursor-not-allowed">Scoring Opens Nov 2</button>
<button class="h-9 flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 text-[13px] font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Edit Results</button>
</div>
<button class="size-9 flex items-center justify-center rounded-lg text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors ml-1">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button></div>
</div>
</div>
<!-- Card 3 -->
<div class="flex flex-col items-stretch justify-start rounded-xl overflow-hidden shadow-sm border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50">
<div class="flex flex-col p-4 gap-3">
<div class="flex justify-between items-start">
<div>
<p class="text-emerald-600 dark:text-emerald-400 text-xs font-bold uppercase tracking-wider mb-1">Status: Completed</p>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">Fintech Innovation Week</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Sep 12 - Sep 15, 2024</p>
</div>
</div>
<div class="flex items-center gap-2 pt-2 border-t border-slate-100 dark:border-slate-800"><div class="grid grid-cols-3 gap-2 flex-1">
<button class="h-9 flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-[13px] font-bold hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">View Results</button>
<div class="flex"></div>
<button class="h-9 flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 text-[13px] font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Edit Results</button>
</div>
<button class="size-9 flex items-center justify-center rounded-lg text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors ml-1">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button></div>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
</div>
</body></html>
