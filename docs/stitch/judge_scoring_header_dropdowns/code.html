<script id="tailwind-config">

            darkMode: "class",
            theme: {

                    colors: {
                        "primary": "#0f49bd",

                        "background-dark": "#101622",

<title>Judge Scoring - Team Alpha</title>
<style>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-white dark:bg-slate-900 shadow-xl">

</button>
<h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Score Team: Alpha</h1>

<span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-0.5">Currently Scoring</span>

<option selected="" value="alpha">Team Alpha</option>
<option value="beta">Team Beta</option>
<option value="gamma">Team Gamma</option>
</select>
</div>
</div>

<option selected="" value="sarah">Sarah Jenkins</option>
<option value="michael">Michael Chen</option>

</select>
<span class="material-symbols-outlined text-slate-400 text-lg">person</span>

<button class="h-10 w-full flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-800 text-sm font-bold text-slate-600 dark:text-slate-400">10</button>

<button class="h-10 w-full flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-800 text-sm font-bold text-slate-600 dark:text-slate-400">2</button>
<button class="h-10 w-full flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-800 text-sm font-bold text-slate-600 dark:text-slate-400">3</button>
<button class="h-10 w-full flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-800 text-sm font-bold text-slate-600 dark:text-slate-400">4</button>

<button class="h-10 w-full flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-800 text-sm font-bold text-slate-600 dark:text-slate-400">9</button>
<button class="h-10 w-full flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-800 text-sm font-bold text-slate-600 dark:text-slate-400">10</button>

<textarea class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none text-slate-800 dark:text-slate-200" id="notes" placeholder="Share your thoughts on the project's impact and delivery..." rows="4"></textarea>
